# Reference catalog only - nothing reads this file automatically. It exists so switching
# experiments doesn't mean retyping feature paths/target/group columns from memory: copy one
# entry's fields into config.yaml's `dataset:` block, then run src/run_experiments.py.
#
# status: closed = investigated, no signal, not worth rerunning (see MODEL_CARD).
#         indicative = small/exploratory comparison point, not a conclusive result.
#         active = the project's main line of work.

datasets:
  - name: kimore_ex5_regression
    features: data/features/kimore/ex5.csv
    target: cTS
    task: regression
    groups: null
    status: closed    # see MODEL_CARD: no signal found across many prior feature families

  - name: kimore_ex5_classification
    features: data/features/kimore/ex5_classification.csv
    target: quality_label
    task: classification
    groups: null
    status: closed

  - name: ui_prmd_deepsquat_classification
    features: data/features/ui_prmd/classification.csv
    target: correct
    task: classification
    groups: null
    status: indicative  # no subject id released -> leakage risk, not conclusive

  - name: ui_prmd_deepsquat_regression
    features: data/features/ui_prmd/regression.csv
    target: quality_score
    task: regression
    groups: null
    status: indicative  # quality_score is circular (GMM loglikelihood of similar data)

  - name: rehab24_ex1
    features: data/features/rehab24/ex1/base.csv
    target: correct
    task: classification
    groups: subject
    status: active

