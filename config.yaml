    groups: subject
    status: active

  - name: rehab24_ex6_dynamics
    features: data/features_rehab24_ex6_dynamics.csv
    target: correct
    task: classification
    groups: subject
    status: active

  # named joint-angle features (build_features_rehab24_anatomical.py): the joint mapping
  # for REHAB24-6's 26 keypoints (data/ui_prmd/joints_names.txt, from the dataset's Zenodo
  # record) is a standard mocap hierarchy, confirmed anatomically plausible. Replaces opaque
  # PCA components with named angles (knee, hip, elbow, shoulder, trunk, ankle, knee valgus)
  # - directly serves the project's own interpretability thesis (Pillar 1). Univariate check
  # shows a much stronger, broader signal than any PCA-based feature set on every exercise.
  - name: rehab24_ex1_anatomical
    features: data/features_rehab24_ex1_anatomical.csv
    target: correct
    task: classification
    groups: subject
    status: active

  - name: rehab24_ex2_anatomical
    features: data/features_rehab24_ex2_anatomical.csv
    target: correct
    task: classification
    groups: subject
    status: active

  - name: rehab24_ex3_anatomical
    features: data/features_rehab24_ex3_anatomical.csv
    target: correct
    task: classification
    groups: subject
    status: active

  - name: rehab24_ex4_anatomical
    features: data/features_rehab24_ex4_anatomical.csv
    target: correct
    task: classification
    groups: subject
    status: active

  - name: rehab24_ex5_anatomical
    features: data/features_rehab24_ex5_anatomical.csv
    target: correct
    task: classification
    groups: subject
    status: active

  - name: rehab24_ex6_anatomical
    features: data/features_rehab24_ex6_anatomical.csv
    target: correct
    task: classification
    groups: subject
    status: active

  # leave-one-exercise-out: same anatomical features, pooled across all 6 exercises, but
  # groups=exercise instead of groups=subject - train on 5 exercise types, test on the 6th,
  # completely unseen. A small-scale, already-available proxy for Pillar 3 (domain transfer:
  # does "correct execution" generalize across movement types, not just across subjects).
  # outer_splits=6 with exactly 6 groups means one exercise per fold, deterministically, so
  # repeats>1 would just recompute the identical split - repeats:1 is correct here, not a
  # rigor shortcut.
  - name: rehab24_pooled_leave_one_exercise_out
    features: data/features_rehab24_pooled_anatomical.csv
    target: correct
    task: classification
    groups: exercise
    outer_splits: 6
    repeats: 1
    status: active
    note: Pillar 3 proxy - cross-exercise transfer, not cross-subject
