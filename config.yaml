# One experiment per launch, on purpose: copy the fields for the dataset you want from
# datasets.yaml into `dataset:` below, then run src/run_experiments.py. Rerunning with the
# same name replaces just that dataset's rows in output - old results for other datasets
# are left alone, so results accumulate across separate, deliberate launches.

seed: 42
outer_splits: 5
inner_splits: 3
repeats: 20
output: results/experiments/experiments.csv

dataset:
  name: rehab24_ex1_anatomical
  features: data/features/rehab24/ex1/anatomical.csv
  target: correct
  task: classification
  groups: subject
