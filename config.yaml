    status: active

  # leave-one-exercise-out: anatomical features pooled across all 6 exercises, groups=exercise
  # instead of groups=subject. outer_splits=6 with 6 groups is a deterministic split, so
  # repeats:1 is correct here, not a shortcut.
  - name: rehab24_pooled_leave_one_exercise_out
    features: data/features_rehab24_pooled_anatomical.csv
    target: correct
    task: classification
    groups: exercise
    outer_splits: 6
    repeats: 1
    status: active
    note: cross-exercise transfer, not cross-subject

  # turnaround-based phase segmentation (build_features_rehab24_biophases.py): descent/bottom/
  # ascent located from each rep's own primary movement angle instead of equal time-thirds
  - name: rehab24_ex1_biophases
    features: data/features_rehab24_ex1_biophases.csv
    target: correct
    task: classification
    groups: subject
